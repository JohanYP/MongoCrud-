<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CRUD Usuarios Premium</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="container">
        <h1>Gestión de Usuarios</h1>

        <!-- Sección Crear -->
        <section class="card">
            <h3>Crear Nuevo Usuario</h3>
            <form id="form-crear" class="form-group">
                <div class="input-group">
                    <label for="crear_nombre">Nombre Completo</label>
                    <input type="text" id="crear_nombre" placeholder="Ej: Juan Pérez" required>
                </div>
                <div class="input-group">
                    <label for="crear_email">Correo Electrónico</label>
                    <input type="email" id="crear_email" placeholder="juan@ejemplo.com" required>
                </div>
                <div class="input-group">
                    <label for="crear_edad">Edad</label>
                    <input type="number" id="crear_edad" placeholder="25" required>
                </div>
                <button type="submit">Guardar Usuario</button>
            </form>
        </section>

        <!-- Sección Actualizar -->
        <section class="card">
            <h3>Actualizar Usuario</h3>
            <p><small style="color: var(--text-muted); display: block; margin-bottom: 1rem;">Haz clic en "Editar" en la lista para cargar los datos</small></p>
            <form id="form-actualizar" class="form-group">
                <div class="input-group">
                    <label for="act_id">ID del Usuario (Solo lectura)</label>
                    <input type="text" id="act_id" placeholder="ID automático" readonly>
                </div>
                <div class="input-group">
                    <label for="act_nombre">Nuevo Nombre</label>
                    <input type="text" id="act_nombre" placeholder="Nuevo nombre">
                </div>
                <div class="input-group">
                    <label for="act_email">Nuevo Correo</label>
                    <input type="email" id="act_email" placeholder="nuevo@correo.com">
                </div>
                <div class="input-group">
                    <label for="act_edad">Nueva Edad</label>
                    <input type="number" id="act_edad" placeholder="Nueva edad">
                </div>
                <button type="submit" class="secondary">Confirmar Actualización</button>
            </form>
        </section>

        <!-- Sección Lista -->
        <section class="card">
            <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 1.5rem;">
                <h3>Usuarios Registrados</h3>
                <button class="secondary" style="padding: 0.5rem 1rem;" onclick="cargar()">Refrescar</button>
            </div>
            <ul id="lista" class="user-list">
                <!-- Se cargará vía JavaScript -->
            </ul>
        </section>
    </div>

    <script src="script.js"></script>
</body>
</html>
