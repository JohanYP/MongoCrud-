services:

  mongo1:
    image: mongo:8
    container_name: mongo1
    command: [ "mongod", "--replSet", "rs0", "--bind_ip_all" ]
    healthcheck:
      test: [ "CMD", "mongosh", "--eval", "db.adminCommand('ping')" ]
      interval: 5s
      timeout: 5s
      retries: 10
      start_period: 15s
    ports:
      - "27017:27017"
    volumes:
      - mongo1_data:/data/db
    networks:
      - mongo-net

  mongo2:
    image: mongo:8
    container_name: mongo2
    command: [ "mongod", "--replSet", "rs0", "--bind_ip_all" ]
    healthcheck:
      test: [ "CMD", "mongosh", "--eval", "db.adminCommand('ping')" ]
      interval: 5s
      timeout: 5s
      retries: 10
      start_period: 15s
    ports:
      - "27018:27017" # ← externo 27018, interno 27017
    volumes:
      - mongo2_data:/data/db
    networks:
      - mongo-net

  mongo3:
    image: mongo:8
    container_name: mongo3
    command: [ "mongod", "--replSet", "rs0", "--bind_ip_all" ]
    healthcheck:
      test: [ "CMD", "mongosh", "--eval", "db.adminCommand('ping')" ]
      interval: 5s
      timeout: 5s
      retries: 10
      start_period: 15s
    ports:
      - "27019:27017" # ← externo 27019, interno 27017
    volumes:
      - mongo3_data:/data/db
    networks:
      - mongo-net

  mongo-arbiter:
    image: mongo:8
    container_name: mongo-arbiter
    command: [ "mongod", "--replSet", "rs0", "--bind_ip_all" ]
    healthcheck:
      test: [ "CMD", "mongosh", "--eval", "db.adminCommand('ping')" ]
      interval: 5s
      timeout: 5s
      retries: 10
      start_period: 15s
    ports:
      - "27020:27017" # ← externo 27020, interno 27017
    volumes:
      - mongo_arb_data:/data/db
    networks:
      - mongo-net

  mongo-init:
    image: mongo:8
    container_name: mongo-init
    depends_on:
      mongo1: { condition: service_healthy }
      mongo2: { condition: service_healthy }
      mongo3: { condition: service_healthy }
      mongo-arbiter: { condition: service_healthy }
    entrypoint: >
      mongosh --host mongo1 --port 27017 --eval "
        try {
          rs.initiate({
            _id: 'rs0',
            members: [
              { _id: 0, host: 'mongo1:27017', priority: 2 },
              { _id: 1, host: 'mongo2:27017', priority: 1 },
              { _id: 2, host: 'mongo3:27017', priority: 1 },
              { _id: 3, host: 'mongo-arbiter:27017', arbiterOnly: true }
            ]
          });
          print('Replica Set inicializado correctamente');
        } catch(e) {
          if (e.message.includes('already initialized')) {
            print('Ya estaba inicializado');
          } else { throw e; }
        }
      "
    networks:
      - mongo-net

  app:
    build: ./crudMongo
    container_name: crud-app
    ports:
      - "4000:4000"
    environment:
      - MONGO_URL=mongodb://mongo1:27017,mongo2:27017,mongo3:27017/test_db?replicaSet=rs0
      - PORT=4000
    depends_on:
      mongo-init:
        condition: service_completed_successfully
    restart: on-failure
    networks:
      - mongo-net

volumes:
  mongo1_data:
  mongo2_data:
  mongo3_data:
  mongo_arb_data:

networks:
  mongo-net:
    driver: bridge
